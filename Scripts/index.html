<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Spirit Clash: Batalla de Invocadores</title>
    <!-- Asegúrate de que estas rutas sean correctas en tu carpeta 'style' -->
    <link rel="stylesheet" href="style/base.css">
    <link rel="stylesheet" href="style/board.css">
    <link rel="stylesheet" href="style/cards.css">
   <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <div id="gameContainer">
        <!-- Cabecera del Juego -->
        <header class="gameHeader">
            <div id="playerOnePanel" class="playerPanel">
                <h2 class="playerName">Clan Shinobi</h2>
                <div class="healthBar"><div id="p1HealthFill" class="fill"></div></div>
                <p>Ki: <span id="p1KiAmount">0</span></p>
            </div>

            <div class="centerControls">
                <div id="diceDisplay" class="diceBox">?</div>
                <button id="rollDiceButton" class="actionButton">LANZAR DADO</button>
                <p id="turnAnnouncer">Turno del Jugador 1</p>
            </div>

            <div id="playerTwoPanel" class="playerPanel">
                <h2 class="playerName">Imperio Saiyan</h2>
                <div class="healthBar"><div id="p2HealthFill" class="fill"></div></div>
                <p>Ki: <span id="p2KiAmount">0</span></p>
            </div>
        </header>

        <!-- Campo de Batalla -->
        <section id="battlefieldArea" class="dropZone">
            <div class="fortress leftFortress"></div>
            <div id="entitiesLayer"></div>
            <div class="fortress rightFortress"></div>
        </section>

        <!-- Contenedor de Cartas -->
        <footer id="inventoryDock" class="cardsContainer"></footer>
    </div>

    <script type="module" src="Scripts/java/main.js"></script>
</body>
</html>
